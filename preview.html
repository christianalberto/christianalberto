<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>README Preview — christianalberto</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-dark.min.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    .toolbar strong { color: #58a6ff; }
    .toolbar span { color: #8b949e; font-size: 14px; }
    .toolbar-actions { display: flex; gap: 8px; align-items: center; }
    .toolbar button {
      background: #238636;
      color: #fff;
      border: 1px solid rgba(240, 246, 252, 0.1);
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 14px;
    }
    .toolbar button.secondary {
      background: #21262d;
      color: #c9d1d9;
    }
    .toolbar button:hover { filter: brightness(1.08); }
    .toolbar label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #8b949e;
      font-size: 13px;
      user-select: none;
    }
    .container {
      max-width: 1012px;
      margin: 0 auto;
      padding: 24px 32px 64px;
    }
    .markdown-body {
      background: #0d1117;
      padding: 32px;
      border: 1px solid #30363d;
      border-radius: 6px;
    }
    .markdown-body img { max-width: 100%; }
    .note {
      margin-bottom: 16px;
      padding: 12px 16px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #161b22;
      color: #8b949e;
      font-size: 14px;
      line-height: 1.5;
    }
    .status {
      margin-bottom: 12px;
      font-size: 13px;
      color: #3fb950;
    }
    .error { color: #f85149; }
  </style>
</head>
<body>
  <div class="toolbar">
    <div>
      <strong>README Preview</strong>
      <span> · vista local similar a GitHub</span>
    </div>
    <div class="toolbar-actions">
      <label>
        <input id="autoReload" type="checkbox" checked />
        Auto-recarga (3s)
      </label>
      <button type="button" class="secondary" onclick="openGithubPreviewHelp()">Preview 100% GitHub</button>
      <button type="button" onclick="loadReadme()">Recargar</button>
    </div>
  </div>

  <div class="container">
    <div class="note">
      Edita <code>README.md</code> en Cursor, guarda (<code>Ctrl+S</code>) y revisa aquí.
      No necesitas commit ni push. Los widgets externos (stats, typing, trophies) cargan desde internet.
    </div>
    <div id="status" class="status">Listo</div>
    <article id="content" class="markdown-body">Cargando README...</article>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    marked.setOptions({ gfm: true, breaks: false });

    let lastHash = "";
    let timer = null;

    function setStatus(text, isError) {
      const el = document.getElementById("status");
      el.textContent = text;
      el.style.color = isError ? "#f85149" : "#3fb950";
    }

    function hashText(text) {
      let h = 0;
      for (let i = 0; i < text.length; i++) h = ((h << 5) - h) + text.charCodeAt(i);
      return String(h);
    }

    async function loadReadme(silent) {
      const content = document.getElementById("content");
      if (!silent) content.textContent = "Cargando README...";

      try {
        const response = await fetch("./README.md?cache=" + Date.now());
        if (!response.ok) throw new Error("No se pudo leer README.md");
        const markdown = await response.text();
        const nextHash = hashText(markdown);

        if (nextHash !== lastHash) {
          content.innerHTML = marked.parse(markdown);
          lastHash = nextHash;
          setStatus("Actualizado: " + new Date().toLocaleTimeString());
        } else if (!silent) {
          setStatus("Sin cambios: " + new Date().toLocaleTimeString());
        }
      } catch (error) {
        content.innerHTML = '<p class="error">Error: ' + error.message + '. Ejecuta <code>preview.bat</code> o <code>npx serve . -p 3333</code> y abre <code>http://localhost:3333/preview.html</code></p>';
        setStatus("Error al cargar README.md", true);
      }
    }

    function setupAutoReload() {
      clearInterval(timer);
      if (document.getElementById("autoReload").checked) {
        timer = setInterval(function () { loadReadme(true); }, 3000);
      }
    }

    function openGithubPreviewHelp() {
      alert(
        "Preview 100% identico a GitHub (sin commit):\n\n" +
        "1. Ve a github.com/christianalberto/christianalberto\n" +
        "2. Abre README.md y clic en el lapiz (Edit)\n" +
        "3. Pega tu README local\n" +
        "4. Clic en la pestana Preview\n" +
        "5. NO hagas commit — cierra la pestana"
      );
    }

    document.getElementById("autoReload").addEventListener("change", setupAutoReload);
    loadReadme();
    setupAutoReload();
  </script>
</body>
</html>
