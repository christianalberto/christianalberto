<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Christian Alberto Domenech - Senior Full Stack Developer">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="50%" stop-color="#16161e"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="50%" stop-color="#bb9af7"/>
      <stop offset="100%" stop-color="#7dcfff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3b4261" stroke-width="0.6" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <circle cx="980" cy="70" r="110" fill="#7aa2f7" opacity="0.08"/>
  <circle cx="180" cy="250" r="90" fill="#bb9af7" opacity="0.10"/>
  <circle cx="620" cy="40" r="60" fill="#7dcfff" opacity="0.08"/>

  <rect x="80" y="248" width="420" height="3" rx="1.5" fill="url(#accent)" filter="url(#softGlow)"/>
  <rect x="70" y="58" width="760" height="170" rx="18" fill="url(#glow)" opacity="0.25"/>

  <text x="80" y="118" fill="#c0caf5" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="42" font-weight="700">Christian Alberto Domenech</text>
  <text x="80" y="162" fill="#9ece6a" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="1.2">SENIOR FULL STACK DEVELOPER</text>
  <text x="80" y="198" fill="#a9b1d6" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="500">Backend &amp; Frontend | Software Development | 18+ Years</text>
  <text x="80" y="228" fill="#565f89" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="15">Java | Spring Boot | Angular | React | REST APIs &amp; Enterprise Applications</text>

  <g transform="translate(860, 88)" opacity="0.95">
    <rect x="0" y="0" width="72" height="72" rx="14" fill="#24283b" stroke="#414868" stroke-width="1.5"/>
    <text x="36" y="44" text-anchor="middle" fill="#ed8b00" font-family="monospace" font-size="22" font-weight="700">J</text>
    <rect x="92" y="0" width="72" height="72" rx="14" fill="#24283b" stroke="#414868" stroke-width="1.5"/>
    <text x="128" y="44" text-anchor="middle" fill="#6db33f" font-family="monospace" font-size="22" font-weight="700">S</text>
    <rect x="46" y="92" width="72" height="72" rx="14" fill="#24283b" stroke="#414868" stroke-width="1.5"/>
    <text x="82" y="136" text-anchor="middle" fill="#3178c6" font-family="monospace" font-size="20" font-weight="700">TS</text>
  </g>

  <rect x="0" y="316" width="1200" height="4" fill="url(#accent)"/>
</svg>
